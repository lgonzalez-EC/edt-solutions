<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximamente - EDT Solutions</title>

    <link rel="shortcut icon" href="assets/images/icon.webp" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        .coming-soon-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #1a1a1a 0%, #303030 50%, #1a1a1a 100%);
        }

        .logo-header {
            padding: 15px;
        }

        .logo-header img {
            width: 120px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .logo-main {
            width: 150px;
            margin-bottom: 20px;
        }

        .tagline {
            font-size: 1.2rem;
            color: #caaf6f;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .development-badge {
            background: linear-gradient(135deg, #caaf6f, #d4c085);
            color: #1a1a1a;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            margin-bottom: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .development-badge i {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .services-preview {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            max-width: 700px;
        }

        .service-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            color: #fff;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(202, 175, 111, 0.3);
        }

        .service-item i {
            color: #caaf6f;
        }

        .contact-section {
            background: rgba(0, 0, 0, 0.4);
            padding: 25px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(202, 175, 111, 0.2);
        }

        .contact-section h3 {
            color: #caaf6f;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            color: #fff;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .contact-item i {
            color: #caaf6f;
        }

        .social-links {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links a {
            color: #fff;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            color: #caaf6f;
            transform: scale(1.2);
        }

        .footer-minimal {
            text-align: center;
            padding: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        @media (max-width: 576px) {
            .logo-main {
                width: 120px;
            }

            .tagline {
                font-size: 1rem;
            }

            .services-preview {
                gap: 10px;
            }

            .service-item {
                font-size: 0.75rem;
                padding: 8px 15px;
            }

            .contact-section {
                padding: 20px;
            }

            .contact-info {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="coming-soon-page">

        <div class="main-content">
            <img src="assets/images/logo_sec.webp" alt="EDT Solutions" class="logo-main">

            <p class="tagline">Tu socio confiable en soluciones en viajes y eventos corporativos</p>

            <div class="development-badge">
                <i class="fas fa-cog"></i>
                Página en desarrollo
            </div>

            <div class="services-preview">
                <div class="service-item">
                    <i class="fas fa-route"></i>
                    Planificación de itinerarios
                </div>
                <div class="service-item">
                    <i class="fas fa-car"></i>
                    Transporte ejecutivo
                </div>
                <div class="service-item">
                    <i class="fas fa-calendar-check"></i>
                    Gestión de eventos
                </div>
                <div class="service-item">
                    <i class="fas fa-chart-line"></i>
                    Auditoría y reporteo
                </div>
            </div>

            <div class="contact-section">
                <h3><i class="fas fa-envelope me-2"></i>Contacto</h3>
                <div class="contact-info">
                    <div class="contact-item">
                        <i class="fas fa-envelope"></i>
                        contacto@edtsolutions.com
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-phone"></i>
                        +52 477 125 7512
                    </div>
                </div>
                <div class="social-links">
                    <a href="https://www.facebook.com/share/1APPRoKW9k/" title="Facebook" target="_blank"><i
                            class="fab fa-facebook"></i></a>
                    <a href="https://www.instagram.com/edt.solutions?igsh=MTZ4b201MWh6MnBteQ==" title="Instagram"
                        target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.linkedin.com/company/edt-solutions/" title="LinkedIn" target="_blank"><i
                            class="fab fa-linkedin"></i></a>
                </div>
            </div>
        </div>

        <div class="footer-minimal">
            &copy; 2026 EDT Solutions. Todos los derechos reservados.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
